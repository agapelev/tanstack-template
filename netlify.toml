[template.environment]
ANTHROPIC_API_KEY = "Add your Anthropic API key here"
GEMINI_API_KEY = "Add your Gemini API key here"

[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  NETLIFY_USE_BUN = "true"
  BUN_VERSION = "1.3.3"

# Автоматически очищать кэш, если изменился lockfile:
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[build.processing]
  skip_processing = false

# netlify.toml — добавьте в конец:
[dev]
  command = "bun run dev"
  framework = "#custom"
  targetPort = 3000
  # Отключаем эмуляцию edge functions для локальной разработки
  publish = "dist"
